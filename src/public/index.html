<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tekimax — Stripe Webhook Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --text:      #e1e4ed;
      --muted:     #8b8fa3;
      --accent:    #6c5ce7;
      --green:     #00b894;
      --red:       #e17055;
      --yellow:    #fdcb6e;
      --blue:      #74b9ff;
      --radius:    10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 0;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--accent); }

    .conn-status {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }

    .conn-dot.connected { background: var(--green); }

    .container { max-width: 1280px; margin: 0 auto; padding: 28px 32px; }

    /* ── Stats Cards ─────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .stat-card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .stat-card.posted  .value { color: var(--green); }
    .stat-card.failed  .value { color: var(--red); }
    .stat-card.ignored .value { color: var(--yellow); }
    .stat-card.dupes   .value { color: var(--muted); }

    /* ── Section ─────────────────────────────── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 28px;
      overflow: hidden;
    }

    .section-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Table ───────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      padding: 10px 16px;
      font-weight: 500;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
    }

    tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr.new-row {
      animation: fadeSlide 0.4s ease-out;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge.POSTED  { background: rgba(0,184,148,0.15); color: var(--green); }
    .badge.FAILED  { background: rgba(225,112,85,0.15); color: var(--red); }
    .badge.IGNORED { background: rgba(253,203,110,0.15); color: var(--yellow); }
    .badge.RECEIVED { background: rgba(116,185,255,0.15); color: var(--blue); }

    .mono {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
    }

    /* ── Ledger ──────────────────────────────── */
    .ledger-list { max-height: 480px; overflow-y: auto; }

    .ledger-entry {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .ledger-entry:last-child { border-bottom: none; }

    .ledger-entry.new-row { animation: fadeSlide 0.4s ease-out; }

    .ledger-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .journal-lines {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .journal-line {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      display: flex;
      gap: 12px;
    }

    .journal-line .side {
      width: 50px;
      font-weight: 600;
    }

    .journal-line .side.debit  { color: var(--blue); }
    .journal-line .side.credit { color: var(--accent); }

    .journal-line .account { width: 160px; }
    .journal-line .amt { text-align: right; min-width: 100px; }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .events-scroll { max-height: 520px; overflow-y: auto; }

    .direction-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 4px;
    }
    .direction-tag.INFLOW  { background: rgba(0,184,148,0.12); color: var(--green); }
    .direction-tag.OUTFLOW { background: rgba(225,112,85,0.12); color: var(--red); }
  </style>
</head>
<body>

<header>
  <h1><span>Tekimax</span> &middot; Stripe Webhook Dashboard</h1>
  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">Connecting…</span>
  </div>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Events</div>
      <div class="value" id="statTotal">–</div>
    </div>
    <div class="stat-card posted">
      <div class="label">Posted</div>
      <div class="value" id="statPosted">–</div>
    </div>
    <div class="stat-card failed">
      <div class="label">Failed</div>
      <div class="value" id="statFailed">–</div>
    </div>
    <div class="stat-card ignored">
      <div class="label">Ignored</div>
      <div class="value" id="statIgnored">–</div>
    </div>
    <div class="stat-card dupes">
      <div class="label">Duplicates Blocked</div>
      <div class="value" id="statDupes">0</div>
    </div>
  </div>

  <!-- Events Table -->
  <div class="section">
    <div class="section-header">Webhook Events</div>
    <div class="events-scroll">
      <table>
        <thead>
          <tr>
            <th>Event ID</th>
            <th>Type</th>
            <th>Status</th>
            <th>Customer</th>
            <th>Amount</th>
            <th>Received</th>
          </tr>
        </thead>
        <tbody id="eventsBody">
          <tr><td colspan="6" class="empty-state">No events yet — send a webhook to get started</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Ledger Journal -->
  <div class="section">
    <div class="section-header">Ledger Journal</div>
    <div class="ledger-list" id="ledgerList">
      <div class="empty-state">No journal entries yet</div>
    </div>
  </div>

</div>

<script>
  const eventsBody  = document.getElementById('eventsBody');
  const ledgerList  = document.getElementById('ledgerList');
  const connDot     = document.getElementById('connDot');
  const connLabel   = document.getElementById('connLabel');

  let duplicatesBlocked = 0;
  let eventsEmpty = true;
  let ledgerEmpty = true;

  function fmtAmount(minor, currency) {
    if (minor == null || currency == null) return '–';
    return (minor / 100).toFixed(2) + ' ' + currency.toUpperCase();
  }

  function fmtTime(iso) {
    if (!iso) return '–';
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function truncateId(id) {
    if (!id) return '–';
    return id.length > 28 ? id.slice(0, 28) + '…' : id;
  }

  function updateStats(stats) {
    document.getElementById('statTotal').textContent   = stats.total;
    document.getElementById('statPosted').textContent  = stats.posted;
    document.getElementById('statFailed').textContent  = stats.failed;
    document.getElementById('statIgnored').textContent = stats.ignored;
    if (stats.duplicatesBlocked > 0) {
      duplicatesBlocked = stats.duplicatesBlocked;
    }
    document.getElementById('statDupes').textContent = duplicatesBlocked;
  }

  function addEventRow(ev) {
    if (eventsEmpty) {
      eventsBody.innerHTML = '';
      eventsEmpty = false;
    }
    const tr = document.createElement('tr');
    tr.className = 'new-row';
    tr.innerHTML = `
      <td class="mono">${truncateId(ev.eventId)}</td>
      <td class="mono">${ev.type}</td>
      <td><span class="badge ${ev.status}">${ev.status}</span></td>
      <td class="mono">${ev.customer || '–'}</td>
      <td class="mono">${fmtAmount(ev.amount, ev.currency)}</td>
      <td>${fmtTime(ev.receivedAt)}</td>
    `;
    eventsBody.prepend(tr);
    setTimeout(() => tr.classList.remove('new-row'), 500);
  }

  function addLedgerEntry(entry) {
    if (ledgerEmpty) {
      ledgerList.innerHTML = '';
      ledgerEmpty = false;
    }
    const div = document.createElement('div');
    div.className = 'ledger-entry new-row';
    const dirClass = entry.direction;
    div.innerHTML = `
      <div>
        <div class="ledger-meta">
          <span class="direction-tag ${dirClass}">${entry.direction}</span>
          &nbsp;${entry.type} &middot; <span class="mono">${truncateId(entry.eventId)}</span>
        </div>
        <div class="journal-lines" style="margin-top:6px">
          <div class="journal-line">
            <span class="side debit">Debit</span>
            <span class="account">${entry.debitAccount}</span>
            <span class="amt">${fmtAmount(entry.amount, entry.currency)}</span>
          </div>
          <div class="journal-line">
            <span class="side credit">Credit</span>
            <span class="account">${entry.creditAccount}</span>
            <span class="amt">${fmtAmount(entry.amount, entry.currency)}</span>
          </div>
        </div>
      </div>
      <div class="ledger-meta">${fmtTime(entry.timestamp)}</div>
    `;
    ledgerList.prepend(div);
    setTimeout(() => div.classList.remove('new-row'), 500);
  }

  // ── Load initial data ──────────────────────
  async function loadInitial() {
    try {
      const [evRes, lgRes] = await Promise.all([
        fetch('/api/events'), fetch('/api/ledger')
      ]);
      const events = await evRes.json();
      const ledger = await lgRes.json();

      if (events.length) {
        eventsBody.innerHTML = '';
        eventsEmpty = false;
        const stats = {
          total: events.length,
          posted:  events.filter(e => e.status === 'POSTED').length,
          failed:  events.filter(e => e.status === 'FAILED').length,
          ignored: events.filter(e => e.status === 'IGNORED').length,
          duplicatesBlocked: 0,
        };
        updateStats(stats);
        events.forEach(ev => addEventRow(ev));
      }

      if (ledger.length) {
        ledgerList.innerHTML = '';
        ledgerEmpty = false;
        ledger.forEach(entry => addLedgerEntry(entry));
      }
    } catch (err) {
      console.error('Failed to load initial data:', err);
    }
  }

  // ── SSE Stream ─────────────────────────────
  function connectSSE() {
    const source = new EventSource('/api/stream');

    source.onopen = () => {
      connDot.classList.add('connected');
      connLabel.textContent = 'Live';
    };

    source.onerror = () => {
      connDot.classList.remove('connected');
      connLabel.textContent = 'Reconnecting…';
    };

    source.addEventListener('webhookEvent', (e) => {
      addEventRow(JSON.parse(e.data));
    });

    source.addEventListener('ledgerEntry', (e) => {
      addLedgerEntry(JSON.parse(e.data));
    });

    source.addEventListener('stats', (e) => {
      updateStats(JSON.parse(e.data));
    });

    source.addEventListener('duplicate', (e) => {
      duplicatesBlocked++;
      document.getElementById('statDupes').textContent = duplicatesBlocked;
    });
  }

  loadInitial().then(connectSSE);
</script>

</body>
</html>
